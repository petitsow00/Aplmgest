name: Build APLMGEST

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Compiler Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Uploader l'installateur Windows
        uses: actions/upload-artifact@v4
        with:
          name: APLMGEST-Windows
          path: dist/*.exe

  build-macos:
    runs-on: macos-13
    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Compiler macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Uploader l'installateur macOS
        uses: actions/upload-artifact@v4
        with:
          name: APLMGEST-macOS
          path: dist/*.dmg
